<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Calico — Lossless Internet Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400&display=swap" rel="stylesheet" />
  <!-- hls.js for HLS stream support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mint:    #D8F2D5;
      --forest:  #1F4E23;
      --teal:    #38A29D;
      --orange:  #EFA63C;
      --charcoal:#231F20;
      --cream:   #F5EADA;
      --white:   #FFFFFF;
    }

    body {
      font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--charcoal);
      background: var(--white);
    }

    /* ── NAV ── */
    nav {
      background: var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      gap: 16px;
    }
    nav img {
      height: 48px;
      width: 48px;
      border-radius: 50%;
      background: var(--mint);
      object-fit: contain;
    }
    nav span {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #0d2b10 0%, #1a3d3b 100%);
      padding: 80px 24px;
      text-align: center;
    }
    .hero h1 {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.2;
      color: var(--white);
      margin-bottom: 12px;
    }
    .hero p {
      color: var(--mint);
      font-size: 1rem;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
    }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--cream);
      border-radius: 12px;
      max-width: 480px;
      margin: 0 auto;
      padding: 32px 32px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .station-info {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .station-info img {
      height: 56px;
      width: 56px;
      border-radius: 50%;
      background: var(--mint);
      object-fit: contain;
      flex-shrink: 0;
    }
    .station-info .meta h2 {
      font-family: "Montserrat", sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--forest);
    }
    .station-info .meta p {
      font-size: 0.875rem;
      color: var(--teal);
      margin-top: 2px;
    }

    /* status dot */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-family: "Montserrat", sans-serif;
      font-weight: 600;
      color: var(--forest);
      background: var(--mint);
      border-radius: 20px;
      padding: 3px 10px;
      margin-top: 6px;
    }
    .live-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--orange);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }

    /* controls row */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .btn-play {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: none;
      background: var(--forest);
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-play:hover { background: var(--teal); }
    .btn-play svg { width: 28px; height: 28px; fill: var(--white); }

    /* volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .volume-row svg { width: 20px; height: 20px; fill: var(--charcoal); flex-shrink: 0; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #ccc;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--teal);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--teal);
      border: none;
      cursor: pointer;
    }

    /* status text */
    #status {
      text-align: center;
      font-size: 0.8rem;
      color: var(--teal);
      margin-top: 16px;
      min-height: 1.2em;
      font-family: "Montserrat", sans-serif;
    }

    /* ── INFO SECTION ── */
    .info-section {
      max-width: 560px;
      margin: 48px auto 0;
      padding: 0 24px;
    }

    /* now playing */
    .now-playing {
      background: var(--forest);
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .now-playing .np-icon {
      flex-shrink: 0;
      width: 72px; height: 72px;
      border-radius: 8px;
      background: var(--teal);
      overflow: hidden;
    }
    .now-playing .np-icon img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .now-playing .np-text { flex: 1; min-width: 0; }
    .now-playing .np-label {
      font-family: "Montserrat", sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 4px;
    }
    .now-playing .np-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .now-playing .np-artist {
      font-size: 0.875rem;
      color: var(--mint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .now-playing .np-meta {
      font-size: 0.75rem;
      color: rgba(216,242,213,0.55);
      margin-top: 4px;
    }
    .np-badge {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .badge {
      font-family: "Montserrat", sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .badge-new  { background: var(--orange); color: var(--charcoal); }
    .badge-summer { background: var(--teal); color: var(--white); }
    .badge-games  { background: #6c5ce7; color: var(--white); }

    /* recently played */
    .recently-played {
      background: var(--cream);
      border-radius: 12px;
      padding: 20px 28px;
    }
    .recently-played h3 {
      font-family: "Montserrat", sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--forest);
      margin-bottom: 16px;
    }
    .track-list { list-style: none; }
    .track-list li {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(31,78,35,0.1);
    }
    .track-list li:last-child { border-bottom: none; }
    .track-num {
      font-family: "Montserrat", sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--teal);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .track-info { flex: 1; min-width: 0; }
    .track-info .t-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--charcoal);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-info .t-artist {
      font-size: 0.8rem;
      color: var(--teal);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--cream);
      text-align: center;
      padding: 32px 24px;
      font-size: 0.875rem;
      color: var(--forest);
      margin-top: 64px;
    }
    footer a { color: var(--teal); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <img src="RadioCalicoLogoTM.png" alt="Radio Calico logo" />
    <span>Radio Calico</span>
  </nav>

  <section class="hero">
    <h1>Kick back &amp; enjoy<br>crystal-clear audio.</h1>
    <p>24-bit / 48 kHz lossless · ad-free · subscription-free</p>

    <div class="player-card" role="region" aria-label="Radio player">

      <div class="station-info">
        <img src="RadioCalicoLogoTM.png" alt="" aria-hidden="true" />
        <div class="meta">
          <h2>Radio Calico</h2>
          <p>Live HLS Stream</p>
          <span class="live-badge"><span class="dot"></span>LIVE</span>
        </div>
      </div>

      <div class="controls">
        <button class="btn-play" id="playBtn" aria-label="Play" aria-pressed="false">
          <!-- play icon -->
          <svg id="iconPlay" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <!-- pause icon (hidden) -->
          <svg id="iconPause" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
      </div>

      <div class="volume-row" aria-label="Volume control">
        <!-- volume icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <input type="range" id="volume" min="0" max="1" step="0.02" value="1" aria-label="Volume" />
      </div>

      <p id="status">Press play to start the stream.</p>

      <!-- hidden audio element -->
      <audio id="audio" preload="none"></audio>
    </div>
  </section>

  <!-- ── INFO WIDGETS ── -->
  <div class="info-section">

    <!-- Now Playing -->
    <div class="now-playing" role="region" aria-label="Now playing" aria-live="polite">
      <div class="np-icon">
        <img id="npCover" src="https://d3d4yli4hf5bmh.cloudfront.net/cover.jpg" alt="Album art" />
      </div>
      <div class="np-text">
        <div class="np-label">Now Playing</div>
        <div class="np-title" id="npTitle">—</div>
        <div class="np-artist" id="npArtist">—</div>
        <div class="np-meta" id="npMeta"></div>
      </div>
      <div class="np-badge" id="npBadges"></div>
    </div>

    <!-- Recently Played -->
    <div class="recently-played" role="region" aria-label="Recently played">
      <h3>Recently Played</h3>
      <ul class="track-list" id="recentList">
        <li><span class="track-num">—</span><div class="track-info"><div class="t-title">Loading…</div></div></li>
      </ul>
    </div>

  </div>

  <footer>
    <p>&copy; 2026 Radio Calico &mdash; <a href="https://d3d4yli4hf5bmh.cloudfront.net/hls/live.m3u8">Stream URL</a></p>
  </footer>

  <script>
    const STREAM = "https://d3d4yli4hf5bmh.cloudfront.net/hls/live.m3u8";
    const audio   = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const iconPlay  = document.getElementById("iconPlay");
    const iconPause = document.getElementById("iconPause");
    const volumeSlider = document.getElementById("volume");
    const status  = document.getElementById("status");

    let hls = null;
    let playing = false;

    function setStatus(msg) { status.textContent = msg; }

    function initHls() {
      if (Hls.isSupported()) {
        hls = new Hls({ enableWorker: true, lowLatencyMode: true });
        hls.loadSource(STREAM);
        hls.attachMedia(audio);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          setStatus("Stream ready.");
          audio.play().catch(() => setStatus("Tap play to start."));
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (data.fatal) setStatus("Stream error — retrying…");
        });
      } else if (audio.canPlayType("application/vnd.apple.mpegurl")) {
        // Native HLS (Safari)
        audio.src = STREAM;
        audio.play().catch(() => setStatus("Tap play to start."));
      } else {
        setStatus("HLS not supported in this browser.");
      }
    }

    function destroyHls() {
      if (hls) { hls.destroy(); hls = null; }
      audio.src = "";
    }

    function togglePlay() {
      if (!playing) {
        setStatus("Connecting…");
        initHls();
        playing = true;
        playBtn.setAttribute("aria-pressed", "true");
        playBtn.setAttribute("aria-label", "Pause");
        iconPlay.style.display  = "none";
        iconPause.style.display = "";
      } else {
        audio.pause();
        destroyHls();
        playing = false;
        playBtn.setAttribute("aria-pressed", "false");
        playBtn.setAttribute("aria-label", "Play");
        iconPlay.style.display  = "";
        iconPause.style.display = "none";
        setStatus("Paused.");
      }
    }

    audio.addEventListener("playing", () => setStatus("Now streaming live \u2014 enjoy the music."));
    audio.addEventListener("waiting", () => setStatus("Buffering…"));
    audio.addEventListener("error",   () => setStatus("Playback error."));

    playBtn.addEventListener("click", togglePlay);

    volumeSlider.addEventListener("input", () => {
      audio.volume = volumeSlider.value;
    });
    // ── METADATA POLLING ──
    const METADATA_URL = "https://d3d4yli4hf5bmh.cloudfront.net/metadatav2.json";
    let lastTitle = null;

    function renderMetadata(d) {
      // Album art
      const cover = document.getElementById("npCover");
      cover.src = "https://d3d4yli4hf5bmh.cloudfront.net/cover.jpg?_=" + Date.now();
      cover.alt = d.title ? `${d.title} — ${d.artist}` : "Album art";

      // Now playing
      document.getElementById("npTitle").textContent  = d.title  || "—";
      document.getElementById("npArtist").textContent = d.artist || "—";

      const metaParts = [];
      if (d.album) metaParts.push(d.album);
      if (d.date)  metaParts.push(d.date);
      if (d.bit_depth && d.sample_rate)
        metaParts.push(`${d.bit_depth}-bit / ${(d.sample_rate/1000).toFixed(1)} kHz`);
      document.getElementById("npMeta").textContent = metaParts.join(" · ");

      // Badges
      const badgeEl = document.getElementById("npBadges");
      badgeEl.innerHTML = "";
      if (d.is_new)      badgeEl.innerHTML += `<span class="badge badge-new">New</span>`;
      if (d.is_summer)   badgeEl.innerHTML += `<span class="badge badge-summer">Summer</span>`;
      if (d.is_vidgames) badgeEl.innerHTML += `<span class="badge badge-games">🎮 Games</span>`;

      // Recently played
      const list = document.getElementById("recentList");
      list.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const artist = d[`prev_artist_${i}`];
        const title  = d[`prev_title_${i}`];
        if (!artist && !title) continue;
        const li = document.createElement("li");
        li.innerHTML = `
          <span class="track-num">${i}</span>
          <div class="track-info">
            <div class="t-title">${title || "—"}</div>
            <div class="t-artist">${artist || "—"}</div>
          </div>`;
        list.appendChild(li);
      }
    }

    async function fetchMetadata() {
      try {
        const res = await fetch(METADATA_URL + "?_=" + Date.now());
        if (!res.ok) return;
        const d = await res.json();
        if (d.title !== lastTitle) {
          lastTitle = d.title;
          renderMetadata(d);
        }
      } catch (_) {}
    }

    fetchMetadata();
    setInterval(fetchMetadata, 15000);

  </script>
</body>
</html>
