<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Calico — Lossless Internet Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mint:    #D8F2D5;
      --forest:  #1F4E23;
      --teal:    #38A29D;
      --orange:  #EFA63C;
      --charcoal:#231F20;
      --cream:   #F5EADA;
      --white:   #FFFFFF;
    }

    body {
      font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--charcoal);
      background: var(--white);
    }

    /* ── NAV ── */
    nav {
      background: var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      gap: 16px;
    }
    nav img {
      height: 48px; width: 48px;
      border-radius: 50%;
      background: var(--mint);
      object-fit: contain;
    }
    nav span {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    /* ── MAIN ── */
    .main {
      max-width: 560px;
      margin: 40px auto;
      padding: 0 24px 64px;
    }

    /* ── NOW PLAYING CARD ── */
    .now-playing {
      background: var(--forest);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    /* top row: cover + info + badges */
    .np-top {
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }
    .np-cover {
      flex-shrink: 0;
      width: 88px; height: 88px;
      border-radius: 8px;
      background: var(--teal);
      overflow: hidden;
    }
    .np-cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .np-info { flex: 1; min-width: 0; }
    .np-label {
      font-family: "Montserrat", sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 4px;
    }
    .np-title-wrap {
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0%, black 4%, black 96%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 4%, black 96%, transparent 100%);
    }
    .np-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--white);
      white-space: nowrap;
      display: inline-block;
    }
    .np-title.scrolling {
      animation: marquee var(--marquee-duration, 8s) ease-in-out infinite alternate;
    }
    @keyframes marquee {
      0%, 15%   { transform: translateX(0); }
      85%, 100% { transform: translateX(var(--marquee-offset, 0px)); }
    }
    .np-artist {
      font-size: 0.875rem;
      color: var(--mint);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .np-meta {
      font-size: 0.75rem;
      color: rgba(216,242,213,0.5);
      margin-top: 2px;
    }
    .np-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .badge {
      font-family: "Montserrat", sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .badge-new    { background: var(--orange); color: var(--charcoal); }
    .badge-summer { background: var(--teal);   color: var(--white); }
    .badge-games  { background: #6c5ce7;       color: var(--white); }

    /* bottom row: controls + volume + rating */
    .np-bottom {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    /* play/pause */
    .btn-play {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--mint);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-play:hover { background: var(--white); }
    .btn-play svg { width: 20px; height: 20px; fill: var(--forest); }

    /* live badge */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: "Montserrat", sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--forest);
      background: var(--mint);
      border-radius: 20px;
      padding: 3px 10px;
    }
    .live-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--orange);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.7); }
    }

    /* volume */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 80px;
    }
    .volume-wrap svg { width: 16px; height: 16px; fill: rgba(216,242,213,0.6); flex-shrink: 0; }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--teal);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--teal);
      border: none;
      cursor: pointer;
    }

    /* divider */
    .np-divider {
      width: 1px; height: 24px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    /* rating */
    .rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rate-label {
      font-family: "Montserrat", sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(216,242,213,0.55);
    }
    .btn-rate {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 3px 10px;
      cursor: pointer;
      color: rgba(216,242,213,0.7);
      font-family: "Montserrat", sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-rate svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
    .btn-rate:hover { background: rgba(255,255,255,0.15); color: var(--white); }
    .btn-rate.voted.up   { background: rgba(31,78,35,0.6);   border-color: var(--mint);   color: var(--mint); }
    .btn-rate.voted.down { background: rgba(239,166,60,0.2); border-color: var(--orange); color: var(--orange); }

    /* status */
    #status {
      font-family: "Montserrat", sans-serif;
      font-size: 0.72rem;
      color: rgba(216,242,213,0.5);
      margin-top: 10px;
      min-height: 1em;
    }

    /* ── RECENTLY PLAYED ── */
    .recently-played {
      background: var(--cream);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .recently-played h3 {
      font-family: "Montserrat", sans-serif;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--forest);
      margin-bottom: 12px;
    }
    .track-list { list-style: none; }
    .track-list li {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(31,78,35,0.1);
    }
    .track-list li:last-child { border-bottom: none; }
    .track-num {
      font-family: "Montserrat", sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--teal);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .track-info { flex: 1; min-width: 0; }
    .t-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--charcoal);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .t-artist {
      font-size: 0.8rem;
      color: var(--teal);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: rgba(31,78,35,0.6);
      margin-top: 16px;
    }

    audio { display: none; }
  </style>
</head>
<body>

  <nav>
    <img src="RadioCalicoLogoTM.png" alt="Radio Calico logo" />
    <span>Radio Calico</span>
  </nav>

  <main class="main">

    <!-- Now Playing -->
    <div class="now-playing" role="region" aria-label="Now playing" aria-live="polite">

      <div class="np-top">
        <div class="np-cover">
          <img id="npCover" src="https://d3d4yli4hf5bmh.cloudfront.net/cover.jpg" alt="Album art" />
        </div>
        <div class="np-info">
          <div class="np-label">Now Playing</div>
          <div class="np-title-wrap">
            <span class="np-title" id="npTitle">—</span>
          </div>
          <div class="np-artist" id="npArtist">—</div>
          <div class="np-meta"   id="npMeta"></div>
          <div class="np-badges" id="npBadges"></div>
        </div>
      </div>

      <div class="np-bottom">
        <!-- play/pause -->
        <button class="btn-play" id="playBtn" aria-label="Play" aria-pressed="false">
          <svg id="iconPlay"  viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <span class="live-badge"><span class="dot"></span>LIVE</span>

        <!-- volume -->
        <div class="volume-wrap" aria-label="Volume">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <input type="range" id="volume" min="0" max="1" step="0.02" value="1" aria-label="Volume" />
        </div>

        <div class="np-divider" aria-hidden="true"></div>

        <!-- rating -->
        <div class="rating-row">
          <span class="rate-label">Rate</span>
          <button class="btn-rate up" id="rateUp" aria-label="Thumbs up" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
            <span class="count">0</span>
          </button>
          <button class="btn-rate down" id="rateDown" aria-label="Thumbs down" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L10.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
            <span class="count">0</span>
          </button>
        </div>
      </div>

      <p id="status"></p>
      <audio id="audio" preload="none"></audio>
    </div>

    <!-- Recently Played -->
    <div class="recently-played" role="region" aria-label="Recently played">
      <h3>Recently Played</h3>
      <ul class="track-list" id="recentList">
        <li><span class="track-num">—</span><div class="track-info"><div class="t-title">Loading…</div></div></li>
      </ul>
    </div>

  </main>

  <footer>&copy; 2026 Radio Calico</footer>

  <script>
    const STREAM = "https://d3d4yli4hf5bmh.cloudfront.net/hls/live.m3u8";
    const audio  = document.getElementById("audio");
    const playBtn    = document.getElementById("playBtn");
    const iconPlay   = document.getElementById("iconPlay");
    const iconPause  = document.getElementById("iconPause");
    const volumeSlider = document.getElementById("volume");
    const statusEl   = document.getElementById("status");

    let hls = null, playing = false;

    function setStatus(msg) { statusEl.textContent = msg; }

    function initHls() {
      if (Hls.isSupported()) {
        hls = new Hls({ enableWorker: true, lowLatencyMode: true });
        hls.loadSource(STREAM);
        hls.attachMedia(audio);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          audio.play().catch(() => setStatus("Tap play to start."));
        });
        hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) setStatus("Stream error — retrying…"); });
      } else if (audio.canPlayType("application/vnd.apple.mpegurl")) {
        audio.src = STREAM;
        audio.play().catch(() => setStatus("Tap play to start."));
      } else {
        setStatus("HLS not supported in this browser.");
      }
    }

    function destroyHls() {
      if (hls) { hls.destroy(); hls = null; }
      audio.src = "";
    }

    function togglePlay() {
      if (!playing) {
        setStatus("Connecting…");
        initHls();
        playing = true;
        playBtn.setAttribute("aria-pressed", "true");
        playBtn.setAttribute("aria-label", "Pause");
        iconPlay.style.display  = "none";
        iconPause.style.display = "";
      } else {
        audio.pause();
        destroyHls();
        playing = false;
        playBtn.setAttribute("aria-pressed", "false");
        playBtn.setAttribute("aria-label", "Play");
        iconPlay.style.display  = "";
        iconPause.style.display = "none";
        setStatus("");
      }
    }

    audio.addEventListener("playing", () => setStatus(""));
    audio.addEventListener("waiting", () => setStatus("Buffering…"));
    audio.addEventListener("error",   () => setStatus("Playback error."));
    playBtn.addEventListener("click", togglePlay);
    volumeSlider.addEventListener("input", () => { audio.volume = volumeSlider.value; });

    // ── METADATA ──
    const METADATA_URL = "https://d3d4yli4hf5bmh.cloudfront.net/metadatav2.json";
    let lastTitle = null;

    function renderMetadata(d) {
      const cover = document.getElementById("npCover");
      cover.src = "https://d3d4yli4hf5bmh.cloudfront.net/cover.jpg?_=" + Date.now();
      cover.alt = d.title ? `${d.title} — ${d.artist}` : "Album art";

      loadRatings(d.artist || "", d.title || "");

      document.getElementById("npTitle").textContent  = d.title  || "—";
      document.getElementById("npArtist").textContent = d.artist || "—";

      // marquee: only animate if text overflows its container
      const titleEl = document.getElementById("npTitle");
      titleEl.classList.remove("scrolling");
      titleEl.style.removeProperty("--marquee-offset");
      titleEl.style.removeProperty("--marquee-duration");
      requestAnimationFrame(() => {
        const overflow = titleEl.scrollWidth - titleEl.parentElement.clientWidth;
        if (overflow > 0) {
          titleEl.style.setProperty("--marquee-offset", `-${overflow}px`);
          titleEl.style.setProperty("--marquee-duration", `${Math.max(4, overflow / 30)}s`);
          titleEl.classList.add("scrolling");
        }
      });

      const parts = [];
      if (d.album) parts.push(d.album);
      if (d.date)  parts.push(d.date);
      if (d.bit_depth && d.sample_rate)
        parts.push(`${d.bit_depth}-bit / ${(d.sample_rate / 1000).toFixed(1)} kHz`);
      document.getElementById("npMeta").textContent = parts.join(" · ");

      const badges = document.getElementById("npBadges");
      badges.innerHTML = "";
      if (d.is_new)      badges.innerHTML += `<span class="badge badge-new">New</span>`;
      if (d.is_summer)   badges.innerHTML += `<span class="badge badge-summer">Summer</span>`;
      if (d.is_vidgames) badges.innerHTML += `<span class="badge badge-games">🎮 Games</span>`;

      const list = document.getElementById("recentList");
      list.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const artist = d[`prev_artist_${i}`], title = d[`prev_title_${i}`];
        if (!artist && !title) continue;
        const li = document.createElement("li");
        li.innerHTML = `<span class="track-num">${i}</span>
          <div class="track-info">
            <div class="t-title">${title || "—"}</div>
            <div class="t-artist">${artist || "—"}</div>
          </div>`;
        list.appendChild(li);
      }
    }

    async function fetchMetadata() {
      try {
        const res = await fetch(METADATA_URL + "?_=" + Date.now());
        if (!res.ok) return;
        const d = await res.json();
        if (d.title !== lastTitle) { lastTitle = d.title; renderMetadata(d); }
      } catch (_) {}
    }

    fetchMetadata();
    setInterval(fetchMetadata, 15000);

    // ── RATINGS ──
    const API = "http://localhost:5000";

    function getUID() {
      let uid = localStorage.getItem("rc_uid");
      if (!uid) { uid = crypto.randomUUID(); localStorage.setItem("rc_uid", uid); }
      return uid;
    }
    const UID = getUID();

    function songKey(artist, title) { return encodeURIComponent(`${artist}|${title}`); }
    let currentKey = null;

    function applyVoteUI(vote) {
      const up = document.getElementById("rateUp"), down = document.getElementById("rateDown");
      up.classList.toggle("voted",   vote === "up");
      down.classList.toggle("voted", vote === "down");
      up.setAttribute("aria-pressed",   String(vote === "up"));
      down.setAttribute("aria-pressed", String(vote === "down"));
    }

    function updateCounts(data) {
      document.getElementById("rateUp").querySelector(".count").textContent   = data.up   ?? 0;
      document.getElementById("rateDown").querySelector(".count").textContent = data.down ?? 0;
    }

    async function loadRatings(artist, title) {
      currentKey = songKey(artist, title);
      try {
        const res = await fetch(`${API}/ratings/${currentKey}?uid=${encodeURIComponent(UID)}`);
        if (!res.ok) return;
        const data = await res.json();
        updateCounts(data);
        applyVoteUI(data.user_vote);
      } catch (_) {}
    }

    async function castVote(type) {
      if (!currentKey) return;
      try {
        const res = await fetch(`${API}/ratings/${currentKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uid: UID, vote: type })
        });
        if (!res.ok) return;
        const data = await res.json();
        updateCounts(data);
        applyVoteUI(data.user_vote);
      } catch (_) {}
    }

    document.getElementById("rateUp").addEventListener("click",   () => castVote("up"));
    document.getElementById("rateDown").addEventListener("click", () => castVote("down"));
  </script>
</body>
</html>
